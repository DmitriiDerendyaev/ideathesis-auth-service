name: Build and Deploy Auth Service to VPS

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # Установка JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Сборка проекта
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Проверка наличия JAR-файла
      - name: List target directory
        run: ls -la target/

      # Логин на VPS через SSH и деплой
      - name: Deploy to VPS
        env:
          SSH_USER: homic
          SSH_HOST: 91.146.28.240
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          # Проверка наличия JAR-файла
          if [ ! -f target/auth-service-0.0.1-SNAPSHOT.jar ]; then
            echo "Error: JAR file target/auth-service-0.0.1-SNAPSHOT.jar not found"
            exit 1
          fi
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no target/auth-service-0.0.1-SNAPSHOT.jar $SSH_USER@$SSH_HOST:/home/$SSH_USER/deploy/auth-service/app.jar
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no Dockerfile $SSH_USER@$SSH_HOST:/home/$SSH_USER/deploy/auth-service/Dockerfile
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << EOF
            docker stop auth-service || true
            docker rm auth-service || true
            docker rmi auth-service:latest || true
            docker network create app-network || true
            cd /home/$SSH_USER/deploy/auth-service
            ls -la # Для отладки: проверить наличие app.jar и Dockerfile
            docker build -t auth-service:latest .
            docker run -d --name auth-service --network app-network -p 8081:8081 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DATABASE_USERNAME="${{ secrets.DATABASE_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
              -e JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
              -e JWT_PUBLIC_KEY="${{ secrets.JWT_PUBLIC_KEY }}" \
              -e USER_SERVICE_BASE_URL="http://user-service:8080/api/users" \
              auth-service:latest
          EOF